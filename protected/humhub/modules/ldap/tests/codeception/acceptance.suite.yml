actor: AcceptanceTester
namespace: ldap
modules:
    enabled:
        - WebDriver
        - tests\codeception\_support\WebHelper
        - tests\codeception\_support\DynamicFixtureHelper
    config:
        WebDriver:
            url: 'http://localhost:8080/'
            browser: chrome
            port: 4444
            window_size: maximize
            restart: true
            capabilities:
                chromeOptions:
                    args: ["--headless", "--no-sandbox", "--disable-dev-shm-usage", "--lang=en-US", "--window-size=1920,1080"]
