[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "nodejs_22"
]

[phases.build]
cmds = [
  "composer install --ignore-platform-reqs",
  "npm ci"
]

[start]
cmd = "useradd -m phpuser 2>/dev/null || true && chown -R phpuser /app/assets /app/uploads /app/protected/runtime /app/protected/config 2>/dev/null || true && chmod -R 777 /app/assets /app/uploads /app/protected/runtime /app/protected/config && php-fpm -y /app/php-fpm.conf"
