[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.curl",
  "php82Extensions.gd",
  "php82Extensions.intl",
  "php82Extensions.mbstring",
  "php82Extensions.pdo_mysql",
  "php82Extensions.xml",
  "php82Extensions.zip"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction"
]

[start]
cmd = "chmod -R 777 /app/assets /app/uploads /app/protected/runtime /app/protected/config && php-fpm"
